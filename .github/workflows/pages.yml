name: Publish data to benchmark.lavinmq.com

on:
  push:
    branches: [main]
    paths:
      - 'results/**'
      - 'scripts/build_latest.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so build_latest.py can read the commit date of the
          # latest version's results directory.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build latest.json
        run: python3 scripts/build_latest.py

      - name: Write CNAME for benchmark.lavinmq.com
        run: echo "benchmark.lavinmq.com" > results/CNAME

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: results

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
